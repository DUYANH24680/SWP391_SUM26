<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="0; url=profile" />
    <title>FreshBasket - Redirecting...</title>
    <style>
        body {
            background-color: #020617;
            color: #94a3b8;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .loader {
            text-align: center;
        }
        .spinner {
            border: 3px solid rgba(16, 185, 129, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #10b981;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        a {
            color: #10b981;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
    <script type="text/javascript">
        window.location.href = "profile";
    </script>
</head>
<body>
    <div class="loader">
        <div class="spinner"></div>
        <p>Đang chuyển hướng đến trang cá nhân...</p>
        <p><small>Nếu trang không tự động chuyển, hãy <a href="profile">nhấp vào đây</a>.</small></p>
    </div>
</body>
</html>
